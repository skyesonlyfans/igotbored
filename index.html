<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I GOT BORED... by Skye</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-color: #f8f9fa;
            --accent-color: #00f2ff;
            --ui-bg: rgba(20, 25, 35, 0.95);
            --card-bg: #1e2530;
        }

        [data-theme='light'] {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --accent-color: #ff85a1;
            --ui-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #eee;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            transition: background-color 0.8s ease;
            display: flex;
        }

        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #menu-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-family: 'Gaegu', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            text-align: center;
        }

        .play-btn {
            font-family: 'Gaegu', cursive;
            font-size: 2.5rem;
            padding: 0.6rem 3.5rem;
            border: 3px solid var(--accent-color);
            color: var(--accent-color);
            background: transparent;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }

        .play-btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-color);
        }

        /* Sidebar UI */
        #ui-sidebar {
            width: 220px;
            height: 100%;
            background: var(--ui-bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
            gap: 0.8rem;
            z-index: 40;
            backdrop-filter: blur(15px);
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        #ui-sidebar.visible {
            transform: translateX(0);
        }

        .tool-btn {
            font-family: 'Gaegu', cursive;
            padding: 0.7rem;
            border-radius: 12px;
            border: 1px solid transparent;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            color: var(--text-color);
            text-align: left;
            width: 100%;
        }

        .tool-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(0, 242, 255, 0.3);
        }

        .tool-btn.mic-active {
            animation: pulse-red 1.5s infinite;
            background: #ff3b70;
            color: white;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 112, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 112, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 112, 0); }
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #000;
            cursor: crosshair;
        }

        canvas { 
            display: block;
            width: 100%;
            height: 100%;
        }

        .instruction {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            text-align: right;
            color: #666;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #theme-toggle {
            margin-top: auto;
            align-self: center;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-color);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body data-theme="dark">

    <div id="menu-overlay">
        <h1>I GOT BORED...</h1>
        <p style="color: #666; font-weight: 300; letter-spacing: 2px;">reactive genetic networks by Skye</p>
        <button class="play-btn" onclick="startGame()">play</button>
    </div>

    <aside id="ui-sidebar">
        <div class="sidebar-label">Creativity</div>
        <button class="tool-btn active" onclick="setTool('food', this)">spawn food</button>
        <button class="tool-btn" onclick="setTool('seeker', this)">spawn seeker</button>
        <button class="tool-btn" onclick="setTool('wall', this)">draw walls</button>
        
        <div class="sidebar-label">Physics Control</div>
        <button class="tool-btn" onclick="setTool('orbit', this)">gravity well</button>
        <button class="tool-btn" onclick="setTool('push', this)">repulse</button>
        <button class="tool-btn active" id="gravity-btn" onclick="toggleGravity(this)">physics: on</button>
        
        <div class="sidebar-label">Audio Engine</div>
        <button class="tool-btn" id="mic-btn" onclick="toggleMic()">listen: off</button>
        
        <div class="sidebar-label">System</div>
        <button class="tool-btn" onclick="clearCanvas()" style="background: rgba(255, 59, 112, 0.1); color: #ff3b70;">reset world</button>
        
        <button id="theme-toggle" onclick="toggleTheme()">
            <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </aside>

    <main id="canvas-container">
        <div class="instruction">Sound reactive colony</div>
        <canvas id="canvas"></canvas>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], seekers = [], walls = [], isDrawing = false;
        let currentTool = 'food', mouse = { x: 0, y: 0, lastX: 0, lastY: 0 }, gravityEnabled = true, theme = 'dark', tick = 0;

        // Audio variables
        let audioCtx, analyser, dataArray, micStream, isMicActive = false, volume = 0, bass = 0;

        const colors = {
            light: ['#ff85a1', '#72efdd', '#4ea8de', '#f48c06', '#9d4edd'],
            dark: ['#00f2ff', '#7000ff', '#ff007b', '#00ff41', '#ffff00', '#ffae00']
        };

        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            const container = document.getElementById('canvas-container');
            container.addEventListener('mousedown', (e) => { 
                isDrawing = true; 
                updateMouse(e);
                mouse.lastX = mouse.x;
                mouse.lastY = mouse.y;
            });
            container.addEventListener('mousemove', (e) => { updateMouse(e); });
            window.addEventListener('mouseup', () => { isDrawing = false; });
            
            container.addEventListener('touchstart', (e) => { 
                isDrawing = true; 
                updateMouse(e.touches[0]); 
                mouse.lastX = mouse.x;
                mouse.lastY = mouse.y;
                e.preventDefault(); 
            }, {passive: false});
            container.addEventListener('touchmove', (e) => { updateMouse(e.touches[0]); e.preventDefault(); }, {passive: false});
            container.addEventListener('touchend', () => { isDrawing = false; });
            
            requestAnimationFrame(loop);
        }

        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if (!isMicActive) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioCtx.createMediaStreamSource(micStream);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isMicActive = true;
                    btn.innerText = "listen: on";
                    btn.classList.add('mic-active');
                } catch (err) {
                    btn.innerText = "mic error";
                }
            } else {
                if (micStream) micStream.getTracks().forEach(t => t.stop());
                isMicActive = false;
                volume = 0; bass = 0;
                btn.innerText = "listen: off";
                btn.classList.remove('mic-active');
            }
        }

        function toggleTheme() {
            theme = theme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-toggle');
            icon.innerHTML = theme === 'dark' ? 
                `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>` : 
                `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
        }

        function resize() { 
            const container = document.getElementById('canvas-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            width = canvas.width = rect.width; 
            height = canvas.height = rect.height; 
        }

        function updateMouse(e) { 
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left; 
            mouse.y = e.clientY - rect.top; 
        }

        function setTool(tool, btn) { 
            currentTool = tool; 
            document.querySelectorAll('#ui-sidebar .tool-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            // Keep gravity button highlighted if gravity is on, regardless of currentTool
            document.getElementById('gravity-btn').classList.toggle('active', gravityEnabled);
        }

        function toggleGravity(btn) { 
            gravityEnabled = !gravityEnabled; 
            btn.innerText = `physics: ${gravityEnabled ? 'on' : 'off'}`; 
            btn.classList.toggle('active', gravityEnabled); 
        }

        function clearCanvas() { particles = []; seekers = []; walls = []; }

        function startGame() { 
            document.getElementById('menu-overlay').classList.add('hidden'); 
            document.getElementById('ui-sidebar').classList.add('visible');
            setTimeout(resize, 100); 
        }

        class Wall {
            constructor(x1, y1, x2, y2) {
                this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y1);
                ctx.lineTo(this.x2, this.y2);
                ctx.strokeStyle = theme === 'dark' ? 'rgba(0, 242, 255, 0.6)' : 'rgba(255, 59, 112, 0.4)';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        function resolveWallCollision(obj) {
            walls.forEach(w => {
                const dx = w.x2 - w.x1;
                const dy = w.y2 - w.y1;
                const l2 = dx * dx + dy * dy;
                if (l2 === 0) return;
                let t = ((obj.x - w.x1) * dx + (obj.y - w.y1) * dy) / l2;
                t = Math.max(0, Math.min(1, t));
                const projX = w.x1 + t * dx;
                const projY = w.y1 + t * dy;
                const dist = Math.hypot(obj.x - projX, obj.y - projY);

                if (dist < obj.radius + 3) {
                    const nx = (obj.x - projX) / dist;
                    const ny = (obj.y - projY) / dist;
                    
                    const dot = obj.vx * nx + obj.vy * ny;
                    if (dot < 0) { // Only reflect if moving towards wall
                        obj.vx = (obj.vx - 2 * dot * nx) * 0.7;
                        obj.vy = (obj.vy - 2 * dot * ny) * 0.7;
                    }

                    obj.x = projX + nx * (obj.radius + 4);
                    obj.y = projY + ny * (obj.radius + 4);
                }
            });
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 2 + 1.5; this.color = color; this.isDead = false;
            }
            update() {
                if (gravityEnabled) {
                    // Normal gravity
                    let gravity = 0.12;
                    
                    // Increase gravity as object gets higher to cap movement at 3/4 screen
                    if (this.y < height * 0.25) {
                        gravity += (0.25 - this.y/height) * 0.8;
                    }
                    
                    this.vy += gravity;

                    // Desensitized Bass Bounce
                    if (isMicActive && bass > 120) {
                        // Higher threshold (120 vs 60), lower force (250 divider)
                        const force = (bass - 120) / 250;
                        // Cap vertical velocity to avoid shooting up
                        this.vy -= Math.min(force * 8, 3.5);
                        this.vx += (Math.random() - 0.5) * force * 5;
                    }
                }
                
                if (isDrawing) {
                    const dx = mouse.x - this.x, dy = mouse.y - this.y, d = Math.sqrt(dx*dx + dy*dy);
                    if (currentTool === 'orbit' && d < 300) { this.vx += dy * ((300 - d) / 4000); this.vy -= dx * ((300 - d) / 4000); }
                    else if (currentTool === 'push' && d < 200) { this.vx -= (dx / d) * 0.6; this.vy -= (dy / d) * 0.6; }
                }

                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.98; this.vy *= 0.98;

                resolveWallCollision(this);

                if (this.x > width || this.x < 0) { this.vx *= -0.8; this.x = Math.max(0, Math.min(width, this.x)); }
                if (this.y > height) { this.vy *= -0.6; this.y = height; }
                if (this.y < 0) { this.vy = Math.abs(this.vy) * 0.3; this.y = 0; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        class Seeker {
            constructor(x, y, hOffset = Math.random() * 360) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3; this.vy = (Math.random() - 0.5) * 3;
                this.radius = 4.5;
                this.maxSpeed = 2.5 + Math.random() * 2;
                this.health = 100;
                this.maxHealth = 100 + Math.random() * 150; 
                this.hOffset = hOffset; 
                this.energy = 0;
                this.pulseSpeed = 0.03 + Math.random() * 0.04;
                this.decayRate = 0.025 + Math.random() * 0.04;
            }

            update() {
                this.health -= this.decayRate;
                if (this.health <= 0) return;

                if (gravityEnabled) {
                    let gravity = 0.08;
                    // Cap at 3/4 height
                    if (this.y < height * 0.25) {
                        gravity += (0.25 - this.y/height) * 0.6;
                    }
                    this.vy += gravity;

                    // Desensitized impulse for Seekers
                    if (isMicActive && bass > 130) {
                        const impulse = (bass - 130) / 100;
                        this.vy -= Math.min(impulse * 1.5, 2.5);
                        this.vx += (Math.random() - 0.5) * impulse * 2;
                    }
                }

                let closest = null, minDist = 400;
                particles.forEach(p => {
                    const d = Math.hypot(p.x - this.x, p.y - this.y);
                    if (d < minDist) { minDist = d; closest = p; }
                });

                if (closest) {
                    const dx = closest.x - this.x, dy = closest.y - this.y;
                    this.vx += (dx / minDist) * 0.4; this.vy += (dy / minDist) * 0.4;
                    if (minDist < this.radius + closest.radius + 3) {
                        closest.isDead = true;
                        this.health = Math.min(this.maxHealth, this.health + 25);
                        this.energy += 30;
                        this.radius = Math.min(14, this.radius + 0.5);
                    }
                }

                if (this.energy > 150) this.reproduce();

                const speed = Math.hypot(this.vx, this.vy);
                const currentMax = this.maxSpeed + (isMicActive ? volume / 30 : 0);
                if (speed > currentMax) { this.vx = (this.vx / speed) * currentMax; this.vy = (this.vy / speed) * currentMax; }
                
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.99; this.vy *= 0.99;
                
                resolveWallCollision(this);

                if (this.x > width || this.x < 0) { this.vx *= -0.7; this.x = Math.max(0, Math.min(width, this.x)); }
                if (this.y > height) { this.vy *= -0.5; this.y = height; }
                if (this.y < 0) { this.vy = Math.abs(this.vy) * 0.2; this.y = 0; }
            }

            reproduce() {
                this.energy = 0; this.radius *= 0.6;
                seekers.push(new Seeker(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, this.hOffset + (Math.random() - 0.5) * 40));
            }

            draw() {
                const lifeRatio = Math.max(0, this.health / this.maxHealth);
                const audioPulse = isMicActive ? (volume / 120) : 0;
                const basePulse = (Math.sin(tick * this.pulseSpeed) + 1) / 2;
                const finalPulse = Math.max(basePulse * lifeRatio, audioPulse * 1.5);
                
                const hue = this.hOffset + (1 - lifeRatio) * 80; 
                const sat = 60 + (lifeRatio * 40);
                const light = 45 + (finalPulse * 45);

                ctx.save();
                ctx.shadowBlur = (15 + finalPulse * 30) * (theme === 'dark' ? 1 : 0.3);
                ctx.shadowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.8)`;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + audioPulse * 15, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${0.2 + finalPulse * 0.8})`;
                ctx.fill();
                
                // Nucleus
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.35, 0, Math.PI * 2);
                ctx.fillStyle = theme === 'dark' ? '#fff' : '#000';
                ctx.fill();
                ctx.restore();
            }
        }

        function loop() {
            tick++;
            if (isMicActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                let bassSum = 0;
                for(let i=0; i<8; i++) bassSum += dataArray[i];
                bass = bassSum / 8;

                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                volume = sum / dataArray.length;
            }

            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-color');
            ctx.fillRect(0, 0, width, height);

            if (isDrawing) {
                if (currentTool === 'food' && particles.length < 2000) {
                    const pool = colors[theme];
                    for(let i=0; i<3; i++) particles.push(new Particle(mouse.x + (Math.random()-0.5)*20, mouse.y + (Math.random()-0.5)*20, pool[Math.floor(Math.random()*pool.length)]));
                } else if (currentTool === 'seeker' && seekers.length < 100) {
                    seekers.push(new Seeker(mouse.x, mouse.y));
                    isDrawing = false;
                } else if (currentTool === 'wall') {
                    const dist = Math.hypot(mouse.x - mouse.lastX, mouse.y - mouse.lastY);
                    if (dist > 8) { // Smoother segmenting
                        walls.push(new Wall(mouse.lastX, mouse.lastY, mouse.x, mouse.y));
                        mouse.lastX = mouse.x;
                        mouse.lastY = mouse.y;
                    }
                }
            }

            walls.forEach(w => w.draw());

            particles = particles.filter(p => !p.isDead);
            particles.forEach(p => { p.update(); p.draw(); });

            ctx.lineWidth = isMicActive ? 1 + (volume / 25) : 1;
            for (let i = 0; i < seekers.length; i++) {
                const s1 = seekers[i];
                if (s1.health <= 0) continue;
                for (let j = i + 1; j < seekers.length; j++) {
                    const s2 = seekers[j];
                    const d = Math.hypot(s1.x - s2.x, s1.y - s2.y);
                    if (d < 160) {
                        const opacity = (1 - (d / 160)) * 0.3 * ((s1.health + s2.health) / (s1.maxHealth + s2.maxHealth));
                        const glow = isMicActive ? (volume / 120) : 0;
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${s1.hOffset}, 80%, 65%, ${opacity + glow})`;
                        ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y);
                        ctx.stroke();
                    }
                }
            }

            seekers = seekers.filter(s => s.health > 0);
            seekers.forEach(s => { s.update(); s.draw(); });

            if (isDrawing && currentTool !== 'wall') {
                ctx.beginPath(); ctx.arc(mouse.x, mouse.y, currentTool === 'orbit' ? 300 : currentTool === 'push' ? 200 : 45, 0, Math.PI * 2);
                ctx.strokeStyle = theme === 'dark' ? 'rgba(0, 242, 255, 0.2)' : 'rgba(0,0,0,0.1)';
                ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            }
            requestAnimationFrame(loop);
        }

        window.onload = init;
    </script>
</body>
</html>
